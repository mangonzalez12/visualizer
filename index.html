<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Visualizer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 14px; background: #f5f5f3; color: #2c2c2a; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 820px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
    #drop-zone { border: 1.5px dashed #b4b2a9; border-radius: 12px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; background: #fff; transition: background 0.15s; }
    #drop-zone:hover, #drop-zone.drag-over { background: #f1efe8; }
    #drop-zone input { display: none; }
    #file-info { font-size: 12px; color: #888780; margin-top: 8px; }
    #error-msg { color: #a32d2d; font-size: 13px; margin-top: 8px; display: none; }
    #controls { display: none; margin-top: 1.5rem; background: #fff; border-radius: 12px; border: 0.5px solid #d3d1c7; padding: 1.25rem; }
    .tabs { display: flex; border: 0.5px solid #d3d1c7; border-radius: 8px; overflow: hidden; width: fit-content; margin-bottom: 1.25rem; }
    .tab { padding: 6px 20px; font-size: 13px; cursor: pointer; background: transparent; border: none; color: #888780; font-family: inherit; transition: background 0.1s, color 0.1s; }
    .tab.active { background: #f1efe8; color: #2c2c2a; font-weight: 500; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
    label { color: #888780; }
    select { font-size: 13px; font-family: inherit; padding: 5px 8px; border: 0.5px solid #d3d1c7; border-radius: 6px; background: #fff; color: #2c2c2a; cursor: pointer; }
    select:focus { outline: none; border-color: #888780; }
    input[type=range] { width: 100px; cursor: pointer; accent-color: #378ADD; }
    input[type=checkbox] { cursor: pointer; accent-color: #378ADD; }
    #chart-area { margin-top: 1rem; }
    .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .upload-title { font-weight: 500; margin-bottom: 4px; }
    .upload-sub { color: #888780; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Data Visualizer</h1>

    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept=".csv">
      <div class="upload-icon">⬆</div>
      <p class="upload-title">Upload a CSV file</p>
      <p class="upload-sub">Click or drag and drop</p>
    </div>
    <div id="file-info"></div>
    <div id="error-msg"></div>

    <div id="controls">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('hist')">Histogram</button>
        <button class="tab" onclick="switchTab('scatter')">Scatter plot</button>
      </div>

      <div id="hist-controls">
        <div class="row">
          <label>Variable</label>
          <select id="hist-var"></select>
          <label style="margin-left:8px;">Bins</label>
          <input type="range" id="bins-slider" min="5" max="80" value="20">
          <span id="bins-val" style="min-width:24px; font-weight:500;">20</span>
        </div>
      </div>

      <div id="scatter-controls" style="display:none;">
        <div class="row">
          <label>X</label>
          <select id="scatter-x"></select>
          <label style="margin-left:8px;">Y</label>
          <select id="scatter-y"></select>
          <label style="margin-left:8px; display:flex; align-items:center; gap:4px; cursor:pointer;">
            <input type="checkbox" id="trend-line" checked> Trend line
          </label>
        </div>
      </div>

      <div id="chart-area">
        <div style="position:relative; width:100%; height:360px;">
          <canvas id="main-chart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    let parsedData = [], numericCols = [], currentTab = 'hist', chartInstance = null;

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); loadFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

    function loadFile(file) {
      if (!file) return;
      Papa.parse(file, {
        header: true, dynamicTyping: true, skipEmptyLines: true,
        complete: function(result) {
          parsedData = result.data;
          const cols = result.meta.fields || [];
          numericCols = cols.filter(c => parsedData.some(r => typeof r[c] === 'number' && !isNaN(r[c])));
          if (numericCols.length === 0) { showError('No numeric columns found in this CSV.'); return; }
          hideError();
          document.getElementById('file-info').textContent = `${parsedData.length} rows · ${cols.length} columns · ${numericCols.length} numeric`;
          populateSelects();
          document.getElementById('controls').style.display = 'block';
          renderChart();
        },
        error: () => showError('Could not parse CSV. Please check the file format.')
      });
    }

    function populateSelects() {
      ['hist-var','scatter-x','scatter-y'].forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = '';
        numericCols.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; el.appendChild(o); });
      });
      if (numericCols.length > 1) document.getElementById('scatter-y').value = numericCols[1];
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i===0&&tab==='hist')||(i===1&&tab==='scatter')));
      document.getElementById('hist-controls').style.display = tab === 'hist' ? '' : 'none';
      document.getElementById('scatter-controls').style.display = tab === 'scatter' ? '' : 'none';
      renderChart();
    }

    document.getElementById('hist-var').addEventListener('change', renderChart);
    document.getElementById('bins-slider').addEventListener('input', function() { document.getElementById('bins-val').textContent = this.value; renderChart(); });
    document.getElementById('scatter-x').addEventListener('change', renderChart);
    document.getElementById('scatter-y').addEventListener('change', renderChart);
    document.getElementById('trend-line').addEventListener('change', renderChart);

    function getColumn(col) {
      return parsedData.map(r => r[col]).filter(v => typeof v === 'number' && !isNaN(v));
    }

    function linearRegression(xs, ys) {
      const n = xs.length, mx = xs.reduce((a,b)=>a+b,0)/n, my = ys.reduce((a,b)=>a+b,0)/n;
      const num = xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
      const den = xs.reduce((s,x)=>s+(x-mx)**2,0);
      const slope = den ? num/den : 0;
      return { slope, intercept: my - slope*mx };
    }

    function renderChart() {
      if (!parsedData.length) return;
      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
      const ctx = document.getElementById('main-chart').getContext('2d');
      const gridColor = 'rgba(136,135,128,0.15)', tickColor = '#888780';

      if (currentTab === 'hist') {
        const col = document.getElementById('hist-var').value;
        const bins = parseInt(document.getElementById('bins-slider').value);
        const vals = getColumn(col);
        const min = Math.min(...vals), max = Math.max(...vals);
        const binWidth = (max - min) / bins;
        const counts = new Array(bins).fill(0);
        vals.forEach(v => { let i = Math.floor((v-min)/binWidth); if(i===bins) i=bins-1; counts[i]++; });
        const labels = counts.map((_,i) => (min + i*binWidth).toFixed(2));
        chartInstance = new Chart(ctx, {
          type: 'bar',
          data: { labels, datasets: [{ label: col, data: counts, backgroundColor: '#378ADD', borderColor: '#185FA5', borderWidth: 0.5, borderRadius: 2 }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { title: items => `${items[0].label} – ${(parseFloat(items[0].label)+binWidth).toFixed(2)}`, label: item => `Count: ${item.raw}` } } },
            scales: {
              x: { ticks: { autoSkip: true, maxTicksLimit: 10, color: tickColor, font: { size: 11 } }, grid: { display: false }, title: { display: true, text: col, color: tickColor } },
              y: { ticks: { color: tickColor, font: { size: 11 } }, grid: { color: gridColor }, title: { display: true, text: 'Count', color: tickColor } }
            }
          }
        });
      } else {
        const xCol = document.getElementById('scatter-x').value;
        const yCol = document.getElementById('scatter-y').value;
        const pairs = parsedData.map(r => ({ x: r[xCol], y: r[yCol] })).filter(p => typeof p.x==='number' && typeof p.y==='number' && !isNaN(p.x) && !isNaN(p.y));
        const showTrend = document.getElementById('trend-line').checked;
        const datasets = [{ label: `${xCol} vs ${yCol}`, data: pairs, backgroundColor: 'rgba(55,138,221,0.5)', borderColor: '#378ADD', pointRadius: 4, pointHoverRadius: 6 }];
        if (showTrend && pairs.length >= 2) {
          const xs = pairs.map(p=>p.x), ys = pairs.map(p=>p.y);
          const { slope, intercept } = linearRegression(xs, ys);
          const minX = Math.min(...xs), maxX = Math.max(...xs);
          datasets.push({ label: 'Trend', data: [{ x: minX, y: slope*minX+intercept }, { x: maxX, y: slope*maxX+intercept }], type: 'line', borderColor: '#E24B4A', borderDash: [5,4], borderWidth: 1.5, pointRadius: 0, fill: false });
        }
        chartInstance = new Chart(ctx, {
          type: 'scatter',
          data: { datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: showTrend, labels: { font: { size: 11 }, color: tickColor, boxWidth: 12 } }, tooltip: { callbacks: { label: item => `(${Number(item.raw.x).toFixed(2)}, ${Number(item.raw.y).toFixed(2)})` } } },
            scales: {
              x: { ticks: { color: tickColor, font: { size: 11 } }, grid: { color: gridColor }, title: { display: true, text: xCol, color: tickColor } },
              y: { ticks: { color: tickColor, font: { size: 11 } }, grid: { color: gridColor }, title: { display: true, text: yCol, color: tickColor } }
            }
          }
        });
      }
    }

    function showError(msg) { const el = document.getElementById('error-msg'); el.textContent = msg; el.style.display = 'block'; }
    function hideError() { document.getElementById('error-msg').style.display = 'none'; }
  </script>
</body>
</html>
